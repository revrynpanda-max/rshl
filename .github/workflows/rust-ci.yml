name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "kai-rust -> target"

    - name: Build
      run: cargo build --verbose --release
      working-directory: ./kai-rust

    - name: Run Tests
      run: cargo test --verbose --release
      working-directory: ./kai-rust
