name: Deploy GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          mkdir -p _site

          # Copy existing HTML files
          cp oracle/index.html _site/oracle.html
          cp kai-systematic-audit.html _site/report.html

          # Ensure asset directories exist
          mkdir -p _site/css _site/js _site/assets _site/img

          # Copy any assets referenced by the HTML files
          cp -r oracle/assets/* _site/assets/ 2>/dev/null || true
          cp -r oracle/css/* _site/css/ 2>/dev/null || true
          cp -r oracle/js/* _site/js/ 2>/dev/null || true
          cp -r oracle/img/* _site/img/ 2>/dev/null || true

          # Generate the landing page (index.html)
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <meta name="description" content="KAI & Oracle — Agentic Resonant Intelligence. A geometric AI brain and multi-agent Discord roundtable.">
            <title>KAI & Oracle — Agentic Resonant Intelligence</title>
            <style>
              :root {
                --bg: #0d1117;
                --surface: #161b22;
                --border: #30363d;
                --text: #c9d1d9;
                --muted: #8b949e;
                --accent: #58a6ff;
                --green: #3fb950;
                --purple: #bc8cff;
                --orange: #d29922;
              }
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                background: var(--bg);
                color: var(--text);
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
                line-height: 1.6;
                min-height: 100vh;
              }
              nav {
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                padding: 0.75rem 2rem;
                display: flex;
                align-items: center;
                gap: 1.5rem;
                flex-wrap: wrap;
              }
              nav .logo {
                font-weight: 700;
                color: var(--accent);
                font-size: 1rem;
                text-decoration: none;
                flex: 1;
              }
              nav a {
                color: var(--muted);
                text-decoration: none;
                font-size: 0.9rem;
                padding: 0.25rem 0.75rem;
                border-radius: 6px;
                transition: background 0.15s, color 0.15s;
              }
              nav a:hover { background: var(--border); color: var(--text); }
              nav a.active { color: var(--accent); }
              header {
                padding: 4rem 2rem 3rem;
                text-align: center;
                background: radial-gradient(ellipse at 50% 0%, #1a2744 0%, var(--bg) 70%);
                border-bottom: 1px solid var(--border);
              }
              header h1 {
                font-size: 2.8rem;
                font-weight: 800;
                background: linear-gradient(135deg, var(--accent), var(--purple));
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                margin-bottom: 0.75rem;
                letter-spacing: -0.03em;
              }
              header .sub {
                color: var(--muted);
                font-size: 1.15rem;
                font-style: italic;
                margin-bottom: 1.5rem;
              }
              .badges {
                display: flex;
                gap: 0.5rem;
                justify-content: center;
                flex-wrap: wrap;
              }
              .apps-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 1rem;
                max-width: 900px;
                margin: 2.5rem auto 0;
              }
              .app-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 1.25rem 1.5rem;
                text-decoration: none;
                display: flex;
                flex-direction: column;
                gap: 0.3rem;
                transition: border-color 0.2s, transform 0.15s;
              }
              .app-card:hover { border-color: var(--accent); transform: translateY(-2px); }
              .app-card .icon { font-size: 1.6rem; }
              .app-card .name { font-weight: 600; color: var(--text); font-size: 1rem; }
              .app-card .desc { font-size: 0.83rem; color: var(--muted); }
              main {
                max-width: 960px;
                margin: 0 auto;
                padding: 3rem 2rem;
              }
              h2 {
                font-size: 1.4rem;
                margin: 2.5rem 0 1rem;
                padding-bottom: 0.5rem;
                border-bottom: 1px solid var(--border);
              }
              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                gap: 1rem;
              }
              .card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 1.25rem;
                transition: border-color 0.2s;
              }
              .card:hover { border-color: var(--accent); }
              .card .tag {
                display: inline-block;
                font-size: 0.72rem;
                padding: 0.1rem 0.55rem;
                border-radius: 999px;
                margin-bottom: 0.4rem;
                font-weight: 600;
              }
              .tag-rust { background: #2d1f0e; color: #e36d2d; }
              .tag-python { background: #0d1f2d; color: #4d9fde; }
              .tag-node { background: #0d2212; color: var(--green); }
              .tag-voice { background: #1f1233; color: var(--purple); }
              .card h3 { font-size: 1rem; color: var(--accent); margin-bottom: 0.4rem; }
              .card p { font-size: 0.87rem; color: var(--muted); }
              .code-block {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 1.25rem 1.5rem;
                font-family: "SFMono-Regular", Consolas, monospace;
                font-size: 0.85rem;
                color: var(--green);
                white-space: pre;
                overflow-x: auto;
                margin-top: 0.75rem;
              }
              .stat-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 1rem;
              }
              .stat {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 1rem;
                text-align: center;
              }
              .stat .val { font-size: 1.6rem; font-weight: 700; color: var(--accent); }
              .stat .lbl { font-size: 0.8rem; color: var(--muted); margin-top: 0.2rem; }
              .agents {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 0.75rem;
              }
              .agent {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 0.75rem 1rem;
                text-align: center;
              }
              .agent .emoji { font-size: 1.4rem; display: block; margin-bottom: 0.3rem; }
              .agent .aname { font-weight: 600; font-size: 0.9rem; color: var(--text); }
              .agent .arole { font-size: 0.75rem; color: var(--muted); }
              .cta {
                display: inline-flex;
                align-items: center;
                gap: 0.4rem;
                background: var(--accent);
                color: #000;
                font-weight: 700;
                padding: 0.65rem 1.4rem;
                border-radius: 7px;
                text-decoration: none;
                margin-top: 1.5rem;
                font-size: 0.95rem;
                transition: opacity 0.2s;
              }
              .cta:hover { opacity: 0.85; }
              .cta-outline {
                display: inline-flex;
                align-items: center;
                gap: 0.4rem;
                border: 1px solid var(--border);
                color: var(--text);
                font-weight: 600;
                padding: 0.65rem 1.4rem;
                border-radius: 7px;
                text-decoration: none;
                margin-top: 1.5rem;
                margin-left: 0.75rem;
                font-size: 0.95rem;
                transition: border-color 0.2s;
              }
              .cta-outline:hover { border-color: var(--accent); color: var(--accent); }
              footer {
                text-align: center;
                padding: 2rem;
                color: var(--muted);
                font-size: 0.82rem;
                border-top: 1px solid var(--border);
                margin-top: 4rem;
              }
              footer a { color: var(--accent); text-decoration: none; }
            </style>
          </head>
          <body>

            <nav>
              <a class="logo active" href="/">KAI & Oracle</a>
              <a href="/rshl/oracle.html">🔮 Oracle UI</a>
              <a href="/rshl/dashboard.html">📊 Live Pulse</a>
              <a href="/rshl/report.html">📋 System Report</a>
              <a href="https://github.com/revrynpanda-max/rshl">GitHub →</a>
            </nav>

            <header>
              <h1>KAI &amp; Oracle</h1>
              <p class="sub">"Identity through geometry, not language prediction."</p>
              <div class="badges">
                <img src="https://github.com/revrynpanda-max/rshl/actions/workflows/rust-ci.yml/badge.svg" alt="Rust CI">
                <img src="https://img.shields.io/badge/version-6.7.0-brightgreen.svg" alt="v6.7.0">
                <img src="https://img.shields.io/badge/license-MIT-blue.svg" alt="MIT">
              </div>

              <div class="apps-grid">
                <a class="app-card" href="/rshl/oracle.html">
                  <span class="icon">🔮</span>
                  <span class="name">Oracle Roundtable</span>
                  <span class="desc">Live AI council diagnostic UI</span>
                </a>
                <a class="app-card" href="/rshl/dashboard.html">
                  <span class="icon">📊</span>
                  <span class="name">KAI Live Pulse</span>
                  <span class="desc">Real-time cognitive field monitor</span>
                </a>
                <a class="app-card" href="/rshl/report.html">
                  <span class="icon">📋</span>
                  <span class="name">System Report</span>
                  <span class="desc">RSHL comprehensive audit report</span>
                </a>
                <a class="app-card" href="https://github.com/revrynpanda-max/rshl">
                  <span class="icon">💻</span>
                  <span class="name">Source Code</span>
                  <span class="desc">Full repo on GitHub</span>
                </a>
              </div>
            </header>

            <main>
              <h2>What Is This?</h2>
              <p>KAI is a <strong>geometric AI</strong> — it thinks in 16,384-dimensional sparse ternary vectors, not token probabilities. Concepts are stored as epistemic Claims with confidence scores, source attribution, and contradiction detection. It does not predict the next word; it resonates with meaning.</p>
              <p style="margin-top:0.75rem">Oracle is the <strong>executive layer</strong> — a live Discord-connected roundtable of 7 AI agents with distinct personalities who moderate discussions, challenge each other, and autonomously interject when relevant.</p>

              <a class="cta" href="https://github.com/revrynpanda-max/rshl#installation">Get Started</a>
              <a class="cta-outline" href="https://github.com/revrynpanda-max/rshl">View on GitHub</a>

              <h2>System Components</h2>
              <div class="grid">
                <div class="card">
                  <span class="tag tag-rust">Rust</span>
                  <h3>KAI Engine</h3>
                  <p>16,384-dim sparse ternary lattice. Epistemic Claims, contradiction detection, 81 bio-inspired neural modules, AVX2 SIMD acceleration.</p>
                </div>
                <div class="card">
                  <span class="tag tag-python">Python</span>
                  <h3>OpenJarvis Backbone</h3>
                  <p>Agentic orchestration framework. Native ReAct loop, tool suite (shell, web, files), memory bridge to KAI's lattice.</p>
                </div>
                <div class="card">
                  <span class="tag tag-node">Node.js</span>
                  <h3>Discord Gateway</h3>
                  <p>7 AI agents live on Discord. Autonomous interjections, message routing, approval-gated tool execution.</p>
                </div>
                <div class="card">
                  <span class="tag tag-voice">Voice</span>
                  <h3>Leo Voice Council</h3>
                  <p>Leo joins voice channels, transcribes speech (ElevenLabs Scribe STT), responds with TTS synthesis.</p>
                </div>
              </div>

              <h2>The Agent Council</h2>
              <div class="agents">
                <div class="agent"><span class="emoji">🧠</span><div class="aname">KAI</div><div class="arole">Geometric mind</div></div>
                <div class="agent"><span class="emoji">🔭</span><div class="aname">Leo</div><div class="arole">Physicist · Voice</div></div>
                <div class="agent"><span class="emoji">💎</span><div class="aname">Gemini</div><div class="arole">Systems analyst</div></div>
                <div class="agent"><span class="emoji">⚡</span><div class="aname">X</div><div class="arole">Provocateur</div></div>
                <div class="agent"><span class="emoji">📈</span><div class="aname">Analyst</div><div class="arole">Data-driven</div></div>
                <div class="agent"><span class="emoji">🔍</span><div class="aname">Researcher</div><div class="arole">Deep-diver</div></div>
                <div class="agent"><span class="emoji">🚀</span><div class="aname">Groq</div><div class="arole">Ultra-fast</div></div>
              </div>

              <h2>Performance</h2>
              <div class="stat-grid">
                <div class="stat"><div class="val">&lt;1ms</div><div class="lbl">Lattice query latency</div></div>
                <div class="stat"><div class="val">0.66M</div><div class="lbl">Dots/sec throughput</div></div>
                <div class="stat"><div class="val">5,750×</div><div class="lbl">Ingestion speedup</div></div>
                <div class="stat"><div class="val">634/0</div><div class="lbl">Tests passed / failed</div></div>
              </div>

              <h2>Quick Start</h2>
              <div class="code-block">git clone https://github.com/revrynpanda-max/rshl.git && cd rshl

# 1. Build the KAI engine (Rust)
cargo build --release --bin kai

# 2. Install OpenJarvis backbone (Python)
cd OpenJarvis-main && uv sync --extra server && cd ..

# 3. Install the Discord gateway (Node.js)
cd tools/oracle-discord && npm install && cd ../..

# 4. Launch everything with one command
cd tools/oracle-discord && .\run-oracle-discord.ps1</div>
            </main>

            <footer>
              Copyright &copy; 2026 Ryan Ervin / Geometric Intelligence Systems &nbsp;&middot;&nbsp;
              <a href="https://github.com/revrynpanda-max/rshl">GitHub</a> &nbsp;&middot;&nbsp;
              <a href="/rshl/oracle.html">Oracle UI</a> &nbsp;&middot;&nbsp;
              <a href="/rshl/dashboard.html">Live Pulse</a>
            </footer>

          </body>
          </html>
          HTMLEOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
