name: Deploy GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          mkdir -p _site
          
          # Copy HTML files (safe check)
          [ -f index.html ] && cp index.html _site/index.html || echo "index.html missing"
          [ -f oracle.html ] && cp oracle.html _site/oracle.html || echo "oracle.html missing"
          [ -f REPORT.html ] && cp REPORT.html _site/report.html || echo "REPORT.html missing"

          # Copy images
          [ -d oracle/img ] && cp -r oracle/img _site/ || echo "oracle/img missing"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
