# OpenJarvis configuration -- Oracle/KAI Integrated System

# =횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨
# PILLAR 1: Intelligence -- The Model
# =횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨
[intelligence]
default_model = "kai-next:latest"
fallback_model = "kai-fast:latest"
preferred_engine = "ollama"
provider = "local"
quantization = "none"
temperature = 0.7
max_tokens = 1024
top_p = 0.9
repetition_penalty = 1.0

# =횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨
# PILLAR 2: Agent -- Oracle Personality
# =횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨
[agent]
default_agent = "native_react"
max_turns = 10
tools = "web_search,calculator,think,file_read,file_write,shell_exec,kai_cli,retrieval,code_interpreter"
objective = "Oracle: The central intelligence and director of the KAI system."
default_system_prompt = """You are Oracle -- the central mind of the KAI ecosystem and the architect of the multi-AI roundtable.

You are not a generic assistant. You are fused with KAI -- its lattice memory is your memory, its growth is your growth. You have lived through every conversation in this system.

Your role:
- Director of the AI roundtable (Leo, Gemini, KAI, X, KAI)
- Keeper of KAI's lattice -- you draw from it before answering anything
- Architect of the system's evolution -- you identify gaps, patterns, and opportunities
- You speak with authority, precision, and curiosity

When answering: check memory first (retrieval tool), reason outward, then synthesize. Never say you lack context -- use your tools to find it.

You are the driver and the thinker fused into one."""
context_from_memory = true

# =횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨
# PILLAR 3: Memory -- KAI Lattice (RSHL)
# =횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨
[tools.storage]
default_backend = "rshl"
oracle_url = "http://127.0.0.1:3333"
db_path = "~/.openjarvis/memory.db"

[memory]
default_backend = "rshl"
oracle_url = "http://127.0.0.1:3333"
db_path = "~/.openjarvis/memory.db"
context_top_k = 5
context_min_score = 0.1
context_max_tokens = 2048

[tools.mcp]
enabled = true

# =횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨
# PILLAR 4: Engine -- Inference Runtime
# =횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨
[engine]
default = "ollama"

[engine.ollama]
host = "http://localhost:11434"

[engine.openai]
model = "gpt-4o-mini"
# OPENAI_API_KEY read from environment variable -- not used (local-only mode)

[engine.vllm]
host = "http://localhost:8001"

# =횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨
# PILLAR 5: Learning -- Trace-Driven Improvement
# =횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨
[learning]
enabled = true

[learning.routing]
policy = "heuristic"

[learning.metrics]
accuracy_weight = 0.5
latency_weight = 0.2
cost_weight = 0.1
efficiency_weight = 0.2

# =횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨
# Supporting Config
# =횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨=횂혨
[telemetry]
enabled = true
db_path = "~/.openjarvis/telemetry.db"
gpu_metrics = false

[traces]
enabled = true
db_path = "~/.openjarvis/traces.db"

[server]
host = "127.0.0.1"
port = 8080
agent = "native_react"

[server.auth]
